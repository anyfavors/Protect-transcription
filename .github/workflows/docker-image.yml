name: CI / Build and push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. LINT  — ruff check + format
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  # ─────────────────────────────────────────────────────────────────────────
  # 2. TYPE CHECK  — mypy
  # ─────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev deps
        run: pip install -r requirements-dev.txt mypy

      - name: mypy
        run: mypy app/

  # ─────────────────────────────────────────────────────────────────────────
  # 3. TEST  — pytest with coverage (requires lint + typecheck to pass)
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (ffmpeg needed for import-time checks)
        run: sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # ─────────────────────────────────────────────────────────────────────────
  # 4. SECURITY SCAN (filesystem)  — before building the image
  # ─────────────────────────────────────────────────────────────────────────
  scan-source:
    name: Trivy source scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: .trivy
          key: ${{ runner.os }}-trivy-${{ github.sha }}
          restore-keys: ${{ runner.os }}-trivy-

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          exit-code: "1"
          cache-dir: .trivy

  # ─────────────────────────────────────────────────────────────────────────
  # 5. BUILD & PUSH  — multi-arch Docker image
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [scan-source]
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          branch: main
          tag_prefix: v
          version_format: "${major}.${minor}.${patch}"
          tag_and_push: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/protect-transcription
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},value=${{ steps.semver.outputs.version }}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # 6. RELEASE
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # 7. SCAN FINAL IMAGE  — non-blocking SARIF upload (won't fail the release)
  # ─────────────────────────────────────────────────────────────────────────
  scan-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: .trivy
          key: ${{ runner.os }}-trivy-${{ github.sha }}
          restore-keys: ${{ runner.os }}-trivy-

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/protect-transcription:${{ needs.build.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "0"          # warn-only — transitive CVEs shouldn't block a release
          cache-dir: .trivy

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
